{% extends "base.html" %}
{% block title %}Atenea{% endblock %}

{% block content %}
<div class="chat-wrapper">

  <div class="chat-header">
    <div style="display:flex; align-items:center; gap:.75rem;">
      <span class="chat-title">Atenea</span>
      <span id="course-badge" class="chat-course-badge"></span>
    </div>
    <div style="display:flex; align-items:center; gap:.6rem;">
      <select id="difficulty" class="difficulty-select" title="Nivel de exigencia de los ejercicios">
        <option value="aprendiendo">🌱 Aprendiendo</option>
        <option value="practicando" selected>📘 Practicando</option>
        <option value="evaluando">📝 Evaluando</option>
        <option value="desafiando">🔥 Desafiando</option>
      </select>
      <button class="btn btn-secondary btn-sm" onclick="openHistory()">🕘 Historial</button>
      <button class="btn btn-secondary btn-sm" onclick="newChat()">Nueva sesión</button>
    </div>
  </div>

  <div id="messages" class="messages"></div>

  <div class="chat-input-area">
    <textarea id="input" class="chat-input" placeholder="Escribe tu respuesta o pregunta..." rows="1" disabled></textarea>
    <button id="send-btn" class="btn btn-primary btn-sm" onclick="sendMessage()" disabled>Enviar</button>
  </div>

</div>

<!-- Panel: Historial de sesiones -->
<div id="history-overlay" class="modal-overlay preview-overlay" style="display:none" onclick="if(event.target===this)closeHistory()">
  <div class="preview-panel history-panel">
    <div class="preview-head">
      <h3>🕘 Historial de sesiones</h3>
      <div class="preview-head-actions">
        <button class="btn btn-secondary btn-sm" onclick="closeHistory()">✕ Cerrar</button>
      </div>
    </div>
    <div class="preview-body" id="history-body">
      <p class="units-hint">Cargando historial…</p>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/chat.js"></script>
{% endblock %}
