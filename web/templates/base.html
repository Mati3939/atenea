<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Atenea{% endblock %}</title>

  <!-- Fonts: async, non-render-blocking -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        media="print" onload="this.media='all'">
  <noscript>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">
  </noscript>

  <!-- KaTeX + marked: servidos localmente (funciona sin internet) -->
  <link rel="stylesheet" href="/static/vendor/katex/katex.min.css">
  <script defer src="/static/vendor/katex/katex.min.js"></script>
  <script defer src="/static/vendor/katex/contrib/auto-render.min.js"
          onload="if(window._pendingMathRender){window._pendingMathRender();}"></script>
  <script src="/static/vendor/marked.min.js"></script>

  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-circle">A</div>
      <div>
        <div class="logo-title">Atenea</div>
        <div class="logo-sub">Asistente de Estudio</div>
      </div>
    </div>
    <nav>
      <a href="/"         class="nav-link {% if active_page == 'chat'     %}active{% endif %}">
        <span class="nav-icon">💬</span> Chat
      </a>
      <a href="/organizacion" class="nav-link {% if active_page == 'organizacion' %}active{% endif %}">
        <span class="nav-icon">📅</span> Organización
      </a>
      <a href="/metodos" class="nav-link {% if active_page == 'metodos' %}active{% endif %}">
        <span class="nav-icon">🧠</span> Métodos de estudio
      </a>
      <a href="/demo" class="nav-link {% if active_page == 'demo' %}active{% endif %}">
        <span class="nav-icon">🎬</span> Modo Demo
      </a>
    </nav>
  </aside>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
